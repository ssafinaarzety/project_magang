<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - AUTORA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">   
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6", // Updated to a nice sky blue
                        "primary-hover": "#2563eb",
                        "sky-glow-light": "#e0f2fe",
                        "sky-glow-mid": "#bae6fd",
                        "sky-glow-dark": "#7dd3fc",
                    },
                    fontFamily: {
                        sans: ["Plus Jakarta Sans", "sans-serif"],
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    animation: {
                        'twinkle': 'twinkle 4s ease-in-out infinite',
                    },
                    keyframes: {
                        twinkle: {
                            '0%, 100%': { opacity: 0.2 },
                            '50%': { opacity: 0.8 },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        .starry-bg {
            background-color: #f0f9ff;
            background-image:
                radial-gradient(at 0% 0%, hsla(203, 89%, 96%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(204, 94%, 90%, 1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(200, 94%, 94%, 1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(199, 89%, 92%, 1) 0, transparent 50%);
        }

        .stars {
            background-image:
                radial-gradient(1px 1px at 20px 30px, #7dd3fc, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 40px 70px, #bae6fd, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 50px 160px, #7dd3fc, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #bae6fd, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 130px 80px, #7dd3fc, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 160px 120px, #38bdf8, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.6;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-sans ...">

<!-- Background glow -->
<div class="absolute w-[600px] h-[600px] bg-blue-300/30 blur-[120px] rounded-full -top-40 -left-40"></div>
<div class="absolute w-[500px] h-[500px] bg-indigo-300/30 blur-[120px] rounded-full bottom-0 right-0"></div>

<div class="w-full max-w-6xl bg-white/70 backdrop-blur-xl shadow-2xl rounded-3xl overflow-hidden grid md:grid-cols-2 border border-white/40">

    <!-- LEFT PANEL -->
    <div class="p-12 bg-gradient-to-br from-sky-500 to-indigo-600 text-white flex flex-col justify-between">

        <div>

            <div class="flex items-center gap-2 mb-10">
                <span class="material-icons text-3xl">inventory_2</span>
                <span class="text-xl font-display font-bold tracking-wider">AUTORA</span>
            </div>

            <h1 class="text-4xl font-display font-bold leading-tight mb-6 tracking-tight">
                Authorization & <br>
                Role Access Database
            </h1>

            <p class="text-sm opacity-90 leading-relaxed max-w-sm">
                Sistem manajemen database Bina Marga DPUPR
            </p>

        </div>

        <div class="text-xs opacity-70">
            © 2026 AUTORA System
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="p-12 flex flex-col justify-center">

        <h2 class="text-3xl font-display font-bold text-slate-800 mb-2 tracking-tight">
            Login
        </h2>

        <p class="text-sm text-slate-500 mb-8">
            Masuk untuk mengakses sistem AUTORA
        </p>

        <form onsubmit="handleLogin(event)" class="space-y-6">

            <!-- EMAIL -->
            <div>

                <label class="text-sm text-slate-600">
                    Username / Email
                </label>

                <div class="relative mt-2">

                    <span class="material-icons absolute left-3 top-3 text-slate-400 text-lg">
                        person_outline
                    </span>

                    <input
                        id="email"
                        name="email"
                        type="text"
                        placeholder="admin atau pegawai"
                        required
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-300 focus:border-sky-400 outline-none text-sm transition"
                    >

                </div>

            </div>

            <!-- PASSWORD -->
            <div>

                <div class="flex justify-between text-sm">
                    <label class="text-slate-600">Password</label>
                    <a href="#" class="text-sky-600 hover:underline">
                        Lupa password?
                    </a>
                </div>

                <div class="relative mt-2">

                    <span class="material-icons absolute left-3 top-3 text-slate-400 text-lg">
                        lock_outline
                    </span>

                    <input
                        id="password"
                        name="password"
                        type="password"
                        placeholder="••••••••"
                        required
                        class="w-full pl-10 pr-10 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-300 focus:border-sky-400 outline-none text-sm"
                    >

                    <span
                        id="togglePassword"
                        class="material-icons absolute right-3 top-3 cursor-pointer text-slate-400 hover:text-sky-500"
                    >
                        visibility
                    </span>

                </div>

            </div>

            <!-- REMEMBER -->
            <div class="flex items-center text-sm text-slate-600">
                <input type="checkbox" id="rememberMe" class="mr-2 rounded">
                Ingat saya
            </div>

            <!-- LOGIN BUTTON -->
            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-600 hover:to-indigo-700 transition shadow-lg"
            >
                Login
            </button>

            <!-- ERROR -->
            <div id="login-error" class="hidden text-red-500 text-sm text-center"></div>

        </form>

        <p class="text-xs text-slate-500 text-center mt-8">
            Butuh bantuan akses?
            <span class="text-sky-600 hover:underline cursor-pointer">
                Hubungi Administrator
            </span>
        </p>

    </div>

</div>

</body>

    <script type="module" src="assets/js/main.js"></script>

    <script>

        const toggle = document.getElementById("togglePassword");
        const password = document.getElementById("password");

        toggle.addEventListener("click", () => {

            if (password.type === "password") {

                password.type = "text";
                toggle.innerText = "visibility_off";

            } else {

                password.type = "password";
                toggle.innerText = "visibility";

            }

        });

    </script>

</body>

</html>
