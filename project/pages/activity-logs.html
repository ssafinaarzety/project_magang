<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - AUTORA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body class="mesh-gradient-bg min-h-screen p-10 font-sans">

    <div class="max-w-6xl mx-auto">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

            <div class="flex items-center gap-4">

                <button onclick="goBack()"
                    class="flex items-center gap-1 px-3 py-2 bg-white/60 backdrop-blur rounded-lg text-sm hover:bg-white/80 transition">

                    <span class="material-icons-outlined text-sm">
                        arrow_back
                    </span>

                    Back

                </button>

                <div>

                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">

                        <span class="material-icons-outlined text-primary">
                            history
                        </span>

                        Activity Logs

                    </h2>

                    <p class="text-sm text-slate-500">
                        Recent user actions and system events
                    </p>

                </div>

            </div>


            <div class="flex flex-wrap items-center gap-3">

                <input id="logSearch" type="text" placeholder="Search logs..."
                    class="bg-white/60 backdrop-blur border border-white/60 rounded-lg px-3 py-2 text-sm w-40" />


                <select id="logFilter"
                    class="bg-white/60 backdrop-blur border border-white/60 rounded-lg px-3 py-2 text-sm">

                    <option value="all">All</option>
                    <option value="upload">Upload</option>
                    <option value="edit">Edit</option>
                    <option value="delete">Delete</option>
                    <option value="access">Access</option>
                    <option value="login">Login</option>
                    <option value="manage_access">Manage Access</option>
                    <option value="remove_access">Remove Access</option>

                </select>


                <button onclick="exportLogs()"
                    class="flex items-center gap-1 bg-white/60 backdrop-blur border border-white/60 px-3 py-2 rounded-lg text-sm hover:bg-white/80 transition">

                    <span class="material-icons-outlined text-sm">
                        download
                    </span>

                    Export

                </button>


                <button onclick="refreshLogs()"
                    class="flex items-center gap-1 bg-white/60 backdrop-blur border border-white/60 px-3 py-2 rounded-lg text-sm hover:bg-white/80 transition">

                    <span class="material-icons-outlined text-sm">
                        refresh
                    </span>

                    Refresh

                </button>

            </div>

        </div>

        <!-- CARD -->
        <div class="bg-white/50 backdrop-blur-md rounded-2xl border border-white/60 overflow-hidden">

            <!-- INFO BAR -->
            <div class="flex items-center justify-between px-6 py-3 bg-white/40 border-b text-sm text-slate-500">

                <p id="logCount">
                    Loading logs...
                </p>

                <p>
                    Latest system activity
                </p>

            </div>

            <!-- TABLE -->
            <div class="overflow-x-auto">

                <table class="w-full text-sm text-left">

                    <thead class="bg-white/40 border-b">

                        <tr>

                            <th class="px-6 py-3 font-semibold text-slate-600">
                                Timestamp
                            </th>

                            <th class="px-6 py-3 font-semibold text-slate-600">
                                User
                            </th>

                            <th class="px-6 py-3 font-semibold text-slate-600">
                                Action
                            </th>

                            <th class="px-6 py-3 font-semibold text-slate-600">
                                File
                            </th>

                            <th class="px-6 py-3 font-semibold text-slate-600 text-right">
                                Status
                            </th>

                        </tr>

                    </thead>


                    <tbody id="activityLogTable" class="divide-y">

                        <tr>
                            <td colspan="5" class="text-center py-6 text-slate-400">
                                Loading activity logs...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

            <!-- PAGINATION -->
            <div class="flex items-center justify-between px-6 py-4 border-t bg-white/40">

                <p id="pageInfo" class="text-sm text-slate-600">
                    Halaman 1
                </p>

                <div class="flex items-center gap-2">

                    <button id="prevPageBtn" onclick="loadPrevPage()" disabled
                        class="flex items-center gap-1 px-4 py-2 bg-white/60 backdrop-blur border rounded-lg text-sm hover:bg-white/80 transition disabled:opacity-50">

                        <span class="material-icons-outlined text-sm">
                            chevron_left
                        </span>

                        Previous

                    </button>

                    <button id="nextPageBtn" onclick="loadNextPage()"
                        class="flex items-center gap-1 px-4 py-2 bg-white/60 backdrop-blur border rounded-lg text-sm hover:bg-white/80 transition disabled:opacity-50">

                        Next

                        <span class="material-icons-outlined text-sm">
                            chevron_right
                        </span>

                    </button>

                </div>

            </div>

        </div>

        <p class="text-center text-slate-400 mt-6 text-sm">
            AUTORA Access System
        </p>

    </div>

    <script>

        function goBack() {
            const view = new URLSearchParams(window.location.search).get("view");
            if (view === "pegawai") {
                window.location.href = "dashboard-pegawai.html";
                return;
            }

            window.location.href = "dashboard-admin.html";
        }

        function refreshLogs() {
            location.reload();
        }

    </script>

    <script type="module" src="../assets/js/activity-logs.js"></script>

</body>

</html>
