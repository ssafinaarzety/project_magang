<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile Pegawai - AUTORA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
primary:"#137fec"
},
fontFamily:{
display:["Inter","sans-serif"]
}
}
}
}
</script>

</head>

<body class="bg-gray-50 font-display flex h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r flex flex-col justify-between">

<div>

<div class="h-16 flex items-center px-6 border-b">

<div class="flex items-center gap-2 text-primary font-bold text-xl">

<span class="material-icons-outlined">verified_user</span>
<span>AUTORA</span>

</div>

</div>

<nav class="p-4 space-y-1">

<a href="dashboard-pegawai.html"
class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg">

<span class="material-icons-outlined">folder_open</span>
Dashboard

</a>

<a href="profile-pegawai.html"
class="flex items-center gap-3 px-4 py-3 bg-primary/10 text-primary rounded-lg font-medium">

<span class="material-icons-outlined">account_circle</span>
Profile

</a>

</nav>

</div>

<div class="p-4 border-t">

<div class="flex items-center gap-3 mb-4">

<div id="pegawaiAvatar"
class="h-10 w-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">

A

</div>

<div>

<p id="pegawaiName" class="text-sm font-semibold">
User
</p>

<p id="pegawaiRole" class="text-xs text-gray-500">
Pegawai
</p>

</div>

</div>

<button id="logoutBtn"
class="w-full flex items-center justify-center gap-2 px-4 py-2 border hover:bg-red-50 hover:text-red-600 rounded-lg text-sm">

<span class="material-icons-outlined">logout</span>
Logout

</button>

</div>

</aside>


<!-- MAIN -->
<main class="flex-1 p-10">

<div class="max-w-3xl mx-auto">

<h1 class="text-2xl font-bold mb-6">
Profile Pegawai
</h1>


<div class="bg-white rounded-xl shadow border p-8 space-y-6">

<div class="flex items-center gap-4">

<div id="profileAvatar"
class="h-16 w-16 rounded-full bg-primary/20 flex items-center justify-center text-primary text-xl font-bold">

A

</div>

<div>

<p id="profileNama" class="text-lg font-semibold">
-
</p>

<p id="profileRole" class="text-gray-500 text-sm">
-
</p>

</div>

</div>


<div class="grid grid-cols-1 md:grid-cols-2 gap-6">


<div>

<label class="text-sm text-gray-500">
Nama
</label>

<p id="profileNamaDetail" class="font-medium">
-
</p>

</div>


<div>

<label class="text-sm text-gray-500">
Email
</label>

<p id="profileEmail">
-
</p>

</div>


<div>

<label class="text-sm text-gray-500">
Role
</label>

<p id="profileRoleDetail">
-
</p>

</div>


<div>

<label class="text-sm text-gray-500">
UID
</label>

<p id="profileUID" class="text-xs break-all">
-
</p>

</div>


</div>

</div>

</div>

</main>



<script type="module">

import { auth, db } from "../assets/js/firebase-config.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="../index.html";
return;

}

const userRef = doc(db,"users",user.uid);

const snap = await getDoc(userRef);

if(!snap.exists()) return;

const data = snap.data();

/* tampilkan data */

document.getElementById("profileNama").innerText = data.nama;
document.getElementById("profileNamaDetail").innerText = data.nama;

document.getElementById("profileEmail").innerText = data.email;

document.getElementById("profileRole").innerText = data.role;
document.getElementById("profileRoleDetail").innerText = data.role;

document.getElementById("profileUID").innerText = user.uid;

/* sidebar */

document.getElementById("pegawaiName").innerText = data.email;
document.getElementById("pegawaiRole").innerText = data.role;

const initial = data.email.charAt(0).toUpperCase();

document.getElementById("pegawaiAvatar").innerText = initial;
document.getElementById("profileAvatar").innerText = initial;

});


document.getElementById("logoutBtn").addEventListener("click",async()=>{

await signOut(auth);

window.location.href="../index.html";

});

</script>


</body>
</html>
