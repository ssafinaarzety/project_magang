<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pegawai Profile - AUTORA</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "primary-dark": "#0f6fcd",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                        "card-light": "#ffffff",
                        "card-dark": "#1a2632"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>

<body data-required-role="pegawai"
    class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased h-screen flex overflow-hidden">
    <aside
        class="w-64 bg-card-light dark:bg-card-dark border-r border-slate-200 dark:border-slate-800 flex flex-col justify-between hidden md:flex z-20 shadow-sm relative">
        <div>
            <div class="h-16 flex items-center px-6 border-b border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-2 text-primary font-bold text-xl">
                    <span class="material-icons-outlined">verified_user</span>
                    <span>AUTORA</span>
                </div>
            </div>

            <nav class="p-4 space-y-1">
                <a class="flex items-center gap-3 px-4 py-3 bg-primary/10 text-primary rounded-lg font-medium transition-colors"
                    href="dashboard-pegawai.html">
                    <span class="material-icons-outlined">folder_open</span>
                    Archive List & Logs
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3 mb-4 px-2">
                <div id="profileAvatarSidebar"
                    class="h-10 w-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold">
                    P
                </div>

                <div class="overflow-hidden">
                    <p id="profileNameSidebar" class="text-sm font-semibold truncate dark:text-white">Pegawai</p>
                    <p id="profileEmailSidebar" class="text-xs text-slate-500 dark:text-slate-400 truncate">
                        pegawai@autora.sys</p>
                </div>
            </div>

            <button id="logoutBtn"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-slate-200 dark:border-slate-700 hover:bg-red-50 hover:border-red-200 hover:text-red-600 dark:hover:bg-red-900/20 dark:hover:text-red-400 rounded-lg text-sm font-medium transition-all text-slate-600 dark:text-slate-400">
                <span class="material-icons-outlined text-lg">logout</span>
                Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto h-screen bg-background-light dark:bg-background-dark">
        <div class="max-w-5xl mx-auto">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Profil Pegawai</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Informasi akun pegawai AUTORA.</p>
            </div>

            <div
                class="bg-card-light dark:bg-card-dark rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-1">
                        <div
                            class="bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 p-5 text-center">
                            <div id="profileAvatar"
                                class="w-20 h-20 mx-auto rounded-full bg-emerald-100 text-emerald-700 font-bold text-2xl flex items-center justify-center">
                                P</div>
                            <h2 id="profileEmailHero"
                                class="mt-4 text-base font-semibold text-slate-800 dark:text-white break-all">
                                pegawai@autora.sys</h2>
                            <p id="profileRole" class="text-sm text-slate-500 dark:text-slate-400">Pegawai</p>
                        </div>
                    </div>

                    <div class="md:col-span-2">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">Email</p>
                                <p id="profileEmail" class="text-sm text-slate-800 dark:text-slate-200 mt-1">-</p>
                            </div>
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">UID</p>
                                <p id="profileUid" class="text-sm text-slate-800 dark:text-slate-200 mt-1 break-all">-
                                </p>
                            </div>
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">Bergabung</p>
                                <p id="profileJoined" class="text-sm text-slate-800 dark:text-slate-200 mt-1">-</p>
                            </div>
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">Login Terakhir</p>
                                <p id="profileLastLogin" class="text-sm text-slate-800 dark:text-slate-200 mt-1">-</p>
                            </div>
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">Departemen</p>
                                <p id="profileDepartment" class="text-sm text-slate-800 dark:text-slate-200 mt-1">-</p>
                            </div>
                            <div
                                class="bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                                <p class="text-xs uppercase text-slate-500 dark:text-slate-400">No. Telepon</p>
                                <p id="profilePhone" class="text-sm text-slate-800 dark:text-slate-200 mt-1">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="px-8 py-5 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex flex-wrap gap-3 justify-end">
                    <button id="backToDashboardBtn"
                        class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                        Kembali ke Dashboard
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../assets/js/profile.js"></script>
</body>

</html>
